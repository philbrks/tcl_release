name: Windows
on:
  workflow_dispatch:
    inputs:
      tcl-tags:
        required: true
        type: choice
        options:
          - '["core-9-0-3"]'
          - '["core-9-1-a1-rc"]'
        default: '["core-9-0-3"]'
      tcllib-tags:
        options:
          - '["tcllib-2-0"]'
        default: '["tcllib-2-0"]'
      tklib-tags:
        options:
          - '["tklib-0.9"]'
        default: '["tklib-0.9"]'
    
permissions:
  contents: read
env:
  ERROR_ON_FAILURES: 1
jobs:
  msvc:
    runs-on: windows-2025
    defaults:
      run:
        shell: powershell
    # Using powershell means we need to explicitly stop on failure
    strategy:
      matrix:
        config:
          - ""
          # - "OPTS=symbols"
          # - "OPTS=static"
        tcl-tag: ${{ fromJSON(github.event.inputs.tcl-tags) }}
        tcllib-tag: ${{ fromJSON(github.event.inputs.tcllib-tags) }}
        tklib-tag: ${{ fromJSON(github.event.inputs.tklib-tags) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        timeout-minutes: 5
        
      - name: Prepare
        run: |
          mkdir "C:\Tcl-tk"
          Add-Content -Path $env:GITHUB_ENV -Value "INSTALLDIR=C:\Tcl-tk"
          if ( '${{ matrix.tcl-tag }}' -match 'core-9-0-.*' ) {
            Add-Content -Path $env:GITHUB_ENV -Value "TCLSH=C:\Tcl-tk\bin\tclsh90.exe"
            Add-Content -Path $env:GITHUB_ENV -Value "TCL_VERSION=9.0.3"
            Add-Content -Path $env:GITHUB_ENV -Value "TCL_DOWNLOAD_DIR=http://prdownloads.sourceforge.net/tcl/"
            Add-Content -Path $env:GITHUB_ENV -Value "TCL_DOWNLOAD_FILE=tcl9.0.3-src.tar.gz"
            Add-Content -Path $env:GITHUB_ENV -Value "TCL_BUILD_DIR=tcl9.0.3"
            Add-Content -Path $env:GITHUB_ENV -Value "TCL_HASH=820AEED1E4E1A89038D0302D2F839E84"
            Add-Content -Path $env:GITHUB_ENV -Value "TCLLIB_VERSION=2.0"
            Add-Content -Path $env:GITHUB_ENV -Value "TKLIB_VERSION=0.9"
          } elseif ( '${{ matrix.tcl-tag }}' -match 'core-9-1-.*' ) {
            Add-Content -Path $env:GITHUB_ENV -Value "TCLSH=C:\Tcl-tk\bin\tclsh91.exe"
          } else {
            throw "Unable to set value for TCLSH variable"
          }
        working-directory: .

      - name: Download Tcl source
        shell: powershell
        run: |
          curl.exe -L -o ${{ env.TCL_DOWNLOAD_FILE }} "${{ env.TCL_DOWNLOAD_DIR }}${{ env.TCL_DOWNLOAD_FILE }}"
          curl.exe -L -o tk${{ env.TCL_VERSION }}-src.tar.gz "http://prdownloads.sourceforge.net/tcl/tk9.0.3-src.tar.gz"
          curl.exe -L -o tcllib-2.0.tar.gz  "http://prdownloads.sourceforge.net/tcllib/tcllib-2.0.tar.gz"
          curl.exe -L -o tklib-0.9.tar.gz   "http://prdownloads.sourceforge.net/tcllib/tklib-0.9.tar.gz"

      - name: Verify downloads
        shell: powershell
        run: |
          if ( (Get-FileHash "tcl${{ env.TCL_VERSION }}-src.tar.gz" -Algorithm MD5).Hash -ne "${{ env.TCL_HASH }}" ) {
            throw "MD5 Checksum hash check failed for tcl${{ env.TCL_VERSION }}-src.tar.gz"
          } else {
            echo "tcl${{ env.TCL_VERSION }}-src.tar.gz successfully downloaded from SourceForge."
          }
          Get-FileHash tk${{ env.TCL_VERSION }}-src.tar.gz -Algorithm MD5
          Get-FileHash tcllib-2.0.tar.gz -Algorithm MD5
          Get-FileHash tklib-0.9.tar.gz -Algorithm MD5
                    
      - name: Extract source archives
        shell: powershell
        run: |
          tar -xzf ${{ env.TCL_DOWNLOAD_FILE }}
          tar -xzf tk${{ env.TCL_VERSION }}-src.tar.gz -C ${{ env.TCL_BUILD_DIR }}/pkgs
          tar -xzf tcllib-2.0.tar.gz
          tar -xzf tklib-0.9.tar.gz
          
      - name: Init MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build Tcl/Tk (${{ matrix.config }})
        run: |
          &nmake -f makefile.vc release ${{ matrix.config }} INSTALLDIR=$Env:INSTALLDIR
        working-directory: tcl${{ env.TCL_VERSION }}/win

      - name: Build Test Harness ${{ matrix.config }}
        if: 1 == 0
        run: |
          &nmake -f makefile.vc ${{ matrix.config }} tcltest
          if ($lastexitcode -ne 0) {
             throw "nmake exit code: $lastexitcode"
          }
        timeout-minutes: 5
        working-directory: tcl${{ env.TCL_VERSION }}/win

      - name: Run Tests ${{ matrix.config }}
        if: 1 == 0
        run: |
          Write-Output "::add-matcher::.github\tcltest.json"
          &nmake -f makefile.vc ${{ matrix.config }} test
          if ($lastexitcode -ne 0) {
             throw "nmake exit code: $lastexitcode"
          }
        timeout-minutes: 30
        working-directory: tcl${{ env.TCL_VERSION }}/win
        env:
          ERROR_ON_FAILURES: 1

      - name: Install Tcl/Tk  (${{ matrix.config }})
        run: |
          &nmake -f makefile.vc install ${{ matrix.config }} INSTALLDIR=$Env:INSTALLDIR
          if ($lastexitcode -ne 0) {
             throw "nmake exit code: $lastexitcode"
          }
        working-directory: tcl${{ env.TCL_VERSION }}/win

      - name: Build tcllib and tklib
        shell: powershell
        run: |
            ${{ env.TCLSH }} tcllib-2.0/installer.tcl -no-gui -html -html-path ${{ env.INSTALLDIR }}/lib -examples -example-path ${{ env.INSTALLDIR }}/lib -pkgs -pkg-path ${{ env.INSTALLDIR }}/lib -apps -app-path ${{ env.INSTALLDIR }}/lib -no-nroff -no-wait
            ${{ env.TCLSH }} tklib-0.9/installer.tcl -no-gui -html -html-path ${{ env.INSTALLDIR }}/lib -examples -example-path ${{ env.INSTALLDIR }}/lib -pkgs -pkg-path ${{ env.INSTALLDIR }}/lib -apps -app-path ${{ env.INSTALLDIR }}/lib -no-nroff -no-wait
      - name: Upload distribution
        uses: actions/upload-artifact@v4
        with:
          name: "Tcl-Tk Release Distribution (Win64)"
          path: ${{ env.INSTALLDIR }} 



























